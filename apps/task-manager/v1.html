<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager — v1</title>
<style>
  :root{
    --bg:#0d1321; --surface:#1b2436; --surface2:#232f45; --text:#f1faee;
    --muted:#8d99ae; --accent:#2a9d8f; --accent2:#e9c46a; --danger:#e63946;
    --line:rgba(255,255,255,.08);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:radial-gradient(ellipse at 50% -10%,#16203a 0%,#0d1321 60%);
    min-height:100vh; color:var(--text);
    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
    display:flex; justify-content:center; padding:48px 16px;
  }
  .app{ width:100%; max-width:560px; }
  header{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:6px; }
  h1{ font-size:26px; font-weight:800; letter-spacing:-.5px; }
  h1 span{ background:linear-gradient(135deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .ver{ color:var(--muted); font-size:13px; }
  .sub{ color:var(--muted); font-size:13.5px; margin-bottom:22px; }

  form{ display:flex; gap:10px; margin-bottom:18px; }
  #field{
    flex:1; background:var(--surface); border:1px solid var(--line); border-radius:12px;
    color:var(--text); font-size:15px; padding:14px 16px; outline:none;
  }
  #field:focus{ border-color:var(--accent); }
  #field::placeholder{ color:var(--muted); }
  button.add{
    background:linear-gradient(135deg,var(--accent),#2f7d72); color:#04231f; border:none;
    border-radius:12px; font-size:15px; font-weight:700; padding:0 20px; cursor:pointer;
  }
  button.add:hover{ filter:brightness(1.08); }
  button.add:disabled{ opacity:.45; cursor:not-allowed; }

  .bar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; padding:0 4px; }
  .count{ color:var(--muted); font-size:13px; }
  .count b{ color:var(--text); }
  .clear{ background:none; border:none; color:var(--muted); font-size:12.5px; cursor:pointer; text-decoration:underline; }
  .clear:hover{ color:var(--danger); }
  .clear:disabled{ opacity:.35; cursor:not-allowed; text-decoration:none; }

  ul{ list-style:none; display:flex; flex-direction:column; gap:8px; }
  li{
    display:flex; align-items:center; gap:12px; background:var(--surface);
    border:1px solid var(--line); border-radius:12px; padding:13px 14px;
    animation:pop .18s ease-out;
  }
  @keyframes pop{ from{opacity:0; transform:translateY(-4px);} to{opacity:1; transform:none;} }
  .check{
    width:22px; height:22px; border-radius:7px; border:2px solid var(--muted);
    flex:none; cursor:pointer; display:grid; place-items:center; transition:.15s;
  }
  .check:hover{ border-color:var(--accent); }
  li.done .check{ background:var(--accent); border-color:var(--accent); }
  .check svg{ width:13px; height:13px; opacity:0; }
  li.done .check svg{ opacity:1; }
  .txt{ flex:1; font-size:15px; word-break:break-word; }
  li.done .txt{ color:var(--muted); text-decoration:line-through; }
  .when{ color:var(--muted); font-size:11.5px; white-space:nowrap; }
  .del{
    background:none; border:none; color:var(--muted); font-size:18px; line-height:1;
    cursor:pointer; padding:2px 6px; border-radius:6px; flex:none;
  }
  .del:hover{ color:var(--danger); background:rgba(230,57,70,.12); }

  .empty{ text-align:center; color:var(--muted); padding:44px 0; }
  .empty .big{ font-size:34px; margin-bottom:8px; }
  footer{ margin-top:26px; text-align:center; color:var(--muted); font-size:11.5px; }
  footer code{ color:var(--accent2); }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>✓ <span>Task Manager</span></h1>
    <span class="ver">v1</span>
  </header>
  <p class="sub">Newest on top · saved in this browser · one screen, no fuss.</p>

  <form id="form">
    <input id="field" type="text" placeholder="What needs doing?" autocomplete="off" maxlength="200" />
    <button class="add" id="addBtn" type="submit" disabled>Add</button>
  </form>

  <div class="bar">
    <span class="count" id="count"></span>
    <button class="clear" id="clearDone">Clear completed</button>
  </div>

  <ul id="list"></ul>

  <footer>Task Manager v1 · decisions recorded as <code>ADRs</code> · data lives in <code>localStorage</code></footer>
</div>

<script>
  // ---- Task Manager v1 ----
  // Data model (ADR-003): task = { id, text, done, createdAt }
  // Persistence (ADR-003): the whole list is one JSON array under one localStorage key.
  // Ordering (ADR-002): newest task on top — we render the array reversed.
  // Scope (ADR-004): create / list / complete / delete only. No accounts, no sync (that's v2).

  const KEY = 'task-manager-v1';
  const list = document.getElementById('list');
  const field = document.getElementById('field');
  const form = document.getElementById('form');
  const addBtn = document.getElementById('addBtn');
  const countEl = document.getElementById('count');
  const clearBtn = document.getElementById('clearDone');

  let tasks = load();

  function load(){
    try { return JSON.parse(localStorage.getItem(KEY)) || []; }
    catch { return []; }
  }
  function save(){ localStorage.setItem(KEY, JSON.stringify(tasks)); }

  function uid(){ return Date.now().toString(36) + Math.floor(Math.random()*1e4).toString(36); }

  function relTime(ts){
    const s = Math.floor((Date.now() - ts)/1000);
    if (s < 60) return 'just now';
    const m = Math.floor(s/60); if (m < 60) return m + 'm ago';
    const h = Math.floor(m/60); if (h < 24) return h + 'h ago';
    const d = Math.floor(h/24); return d + 'd ago';
  }

  function render(){
    list.innerHTML = '';
    if (tasks.length === 0){
      list.innerHTML = '<div class="empty"><div class="big">🗒️</div>No tasks yet. Add your first above.</div>';
    } else {
      // ADR-002: newest first — iterate the array back to front
      for (let i = tasks.length - 1; i >= 0; i--){
        const t = tasks[i];
        const li = document.createElement('li');
        if (t.done) li.className = 'done';
        li.innerHTML =
          '<div class="check" role="checkbox" aria-checked="'+t.done+'" tabindex="0">'+
            '<svg viewBox="0 0 24 24" fill="none" stroke="#04231f" stroke-width="3.5"><path d="M20 6L9 17l-5-5"/></svg>'+
          '</div>'+
          '<span class="txt"></span>'+
          '<span class="when">'+relTime(t.createdAt)+'</span>'+
          '<button class="del" title="Delete" aria-label="Delete task">&times;</button>';
        li.querySelector('.txt').textContent = t.text;   // textContent = safe against HTML injection
        li.querySelector('.check').onclick = () => toggle(t.id);
        li.querySelector('.check').onkeydown = (e) => { if (e.key===' '||e.key==='Enter'){ e.preventDefault(); toggle(t.id);} };
        li.querySelector('.del').onclick = () => remove(t.id);
        list.appendChild(li);
      }
    }
    const left = tasks.filter(t => !t.done).length;
    countEl.innerHTML = tasks.length
      ? '<b>'+left+'</b> of <b>'+tasks.length+'</b> remaining'
      : '';
    clearBtn.disabled = !tasks.some(t => t.done);
  }

  function add(text){
    text = text.trim();
    if (!text) return;
    tasks.push({ id: uid(), text, done: false, createdAt: Date.now() });
    save(); render();
  }
  function toggle(id){
    const t = tasks.find(t => t.id === id);
    if (t){ t.done = !t.done; save(); render(); }
  }
  function remove(id){
    tasks = tasks.filter(t => t.id !== id);
    save(); render();
  }

  form.addEventListener('submit', (e) => { e.preventDefault(); add(field.value); field.value=''; addBtn.disabled=true; field.focus(); });
  field.addEventListener('input', () => { addBtn.disabled = field.value.trim() === ''; });
  clearBtn.addEventListener('click', () => { tasks = tasks.filter(t => !t.done); save(); render(); });

  render();
  field.focus();
</script>
</body>
</html>
